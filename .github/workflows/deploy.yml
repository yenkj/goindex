name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # 确保秒启动，不排队
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js 14
        uses: actions/setup-node@v3
        with:
          node-version: '14' # 强制使用旧版环境，完美兼容 Vue CLI 4

      - name: Clean, Install and Build
        run: |
          # 1. 进入子目录
          cd goindex-acrou
          
          # 2. 彻底清除之前报错留下的所有干扰文件
          rm -rf node_modules package-lock.json
          
          # 3. Node 14 模式下直接安装，不需要 legacy-provider 旗标
          # --no-audit 和 --no-fund 可以加快在服务器上的安装速度
          npm install --no-audit --no-fund
          
          # 4. 执行构建
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./goindex-acrou/dist
