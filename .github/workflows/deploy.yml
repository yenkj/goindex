name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # 回到 18 以支持 openssl-legacy-provider

      - name: Clean, Install and Build
        env:
          # 在 Node 18 下，必须开启此项以兼容旧版 Webpack 4
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          cd goindex-acrou
          
          # 1. 彻底清除网页端可能残留的冲突文件
          rm -f package-lock.json
          rm -rf node_modules
          
          # 2. 解决 node-sass 这种顽固分子的二进制编译问题
          npm uninstall node-sass
          npm install sass sass-loader@8.0.2 --save-dev
          
          # 3. 现场生成全新的依赖树，不读取旧的 lockfile
          npm install --legacy-peer-deps --no-package-lock
          
          # 4. 构建
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./goindex-acrou/dist
