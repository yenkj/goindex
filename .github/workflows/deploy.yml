name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Clean and Build
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          # 1. 进入项目目录
          cd goindex-acrou
          
          # 2. 物理删除旧的 lock 文件和 node_modules
          # 这是解决 "Exit handler never called" 和 "ENOTEMPTY" 的唯一稳妥办法
          rm -rf node_modules package-lock.json
          
          # 3. 处理会导致构建失败的 node-sass
          # 直接将其替换为现代的 dart-sass (即 sass 包)
          npm uninstall node-sass
          npm install sass sass-loader@8.0.2 --save-dev
          
          # 4. 执行全新安装，不生成也不读取 lock 文件
          # --no-package-lock 彻底避开 npm 内部的重命名逻辑错误
          npm install --legacy-peer-deps --no-package-lock
          
          # 5. 执行构建
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./goindex-acrou/dist
