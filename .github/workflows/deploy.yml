name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16' # 对于这种旧版 GoIndex，Node 16 的稳定性远高于 18/20

      - name: Clean, Install and Build
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          # 1. 进入子目录
          cd goindex-acrou
          
          # 2. 【核心修复】强力删除所有可能导致 npm 崩溃的旧文件
          # 既然你只有网页端，我们就让服务器每次都“白手起家”
          rm -f package-lock.json
          rm -rf node_modules
          
          # 3. 解决 node-sass 导致的安装崩溃
          # 先卸载，再安装现代的 sass 替代品
          npm uninstall node-sass
          npm install sass sass-loader@8.0.2 --save-dev
          
          # 4. 全新安装依赖（跳过 lock 文件逻辑）
          npm install --legacy-peer-deps --no-package-lock
          
          # 5. 执行构建
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./goindex-acrou/dist
