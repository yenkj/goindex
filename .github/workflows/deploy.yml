name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-20.04  # 使用旧版系统镜像，兼容性更好
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14.21.3' # 使用 Node 14 最后的稳定版

      - name: Clean and Build
        run: |
          cd goindex-acrou
          
          # 1. 物理清理（Node 14 也要清理，确保万无一无）
          rm -rf node_modules package-lock.json
          
          # 2. 这里的 npm 是旧版的，处理 node-sass 极其稳定
          # 不需要卸载 node-sass，直接安装即可
          # 如果安装报错，请告诉我，我们再考虑替换 sass
          npm install
          
          # 3. 执行构建
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./goindex-acrou/dist
