name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Node 18 对旧项目兼容性较好

      - name: Install and Build
        # 核心修复：设置 working-directory 为你的子文件夹名
        working-directory: ./goindex-acrou 
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          # 1. 强制清理并安装依赖
          npm install --legacy-peer-deps
          
          # 2. 修复 node-sass 在 Linux 环境下的兼容性（如果报错的话）
          # npm rebuild node-sass
          
          # 3. 运行构建
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 核心修复：指向子目录下的 dist 文件夹
          publish_dir: ./goindex-acrou/dist
