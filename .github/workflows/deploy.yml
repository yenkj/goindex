name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Clean, Install and Build
        env:
          # 核心修复：1.开启旧版兼容 2.将内存限制提升到 4GB 防止构建中途卡死
          NODE_OPTIONS: --openssl-legacy-provider --max-old-space-size=4096
        run: |
          # 进入子目录
          cd goindex-acrou
          
          echo ">>> 正在清理旧环境..."
          rm -rf node_modules package-lock.json
          
          echo ">>> 正在替换 sass 编译器..."
          npm uninstall node-sass --quiet
          npm install sass sass-loader@8.0.2 --save-dev --quiet
          
          echo ">>> 正在安装依赖 (这可能需要 2-3 分钟，请稍候)..."
          # 使用 --no-audit 和 --no-fund 减少不必要的网络请求和输出，加快速度
          npm install --legacy-peer-deps --no-package-lock --no-audit --no-fund --quiet
          
          echo ">>> 正在开始构建 (已开启详细日志输出)..."
          # 添加 --verbose 标记，如果卡住了，你可以看到具体卡在哪一个文件
          npm run build -- --verbose

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./goindex-acrou/dist
